spring.application.name=easyEstoque

spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.jpa.hibernate.ddl-auto=update

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ativar o actuator's

# habilitar todos os entrypointso do actuator com "*" deve ser evitado mas para estudo e exemplo neste projeto está habilitado
#management.endpoints.web.exposure.include=health,info
management.endpoints.web.exposure.include=* 
management.endpoints.web.exposure.exclude=health

management.info.env.enabled=true

info.app.name=Easy Estoque
info.app.descriptiom=Projeto para estudar o Spring Boot como back-end para sistema de estoque
info.app.version=0.1.0 - DEV VERSION