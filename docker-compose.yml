version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    image: minha-app-api:latest
    container_name: api_service
    depends_on:
      db:
        condition: service_healthy # Espera o DB estar pronto, não apenas iniciado
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    restart: always
    networks:
      - backend

  db:
    image: postgres:15-alpine # Use uma versão específica e a variante 'alpine' (mais leve)
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    # Removi o mapeamento de porta externa por segurança. 
    # Use se precisar acessar o DB via DBeaver/Postico:
    # ports:
    #   - "6050:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge